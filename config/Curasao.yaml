inherit: "config/base.yaml"

use_calib: True
dataset:
  type: colmap
  subsample: 1
  img_downsample: 1
  image_subdir: images_wb
  sparse_dir: sparse/0
  center_principle_point: True

tracking:
  match_frac_thresh: 0.4

training:
  use_kf_BA: False
  kf_overlap: 0.1
  new_mapping_iter: 100
  normal_mapping_iters: 40
  opacity_thre: 0.99
  compensate_exposure: True

color_refine:
  max_gaussian_points: 300000
  sh_max: 0
  config_sh_degree_interval: 1000
  clip_thresh: 0.01
  color_refinement_iters: 300

save_results: True
output:
  base_dir: "outputs/Curasao"
